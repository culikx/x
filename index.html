<!DOCTYPE html>
<html lang="id" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ambil Data URL</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
body{background:#0f0f0f}
.card{background:#1a1a1a;border:1px solid #2a2a2a}
.code-box{background:#000;border-radius:8px;padding:15px;font-family:monospace;font-size:14px;overflow-x:auto}
</style>
</head>
<body>
<div class="container py-5">

  <h3 class="mb-4"><i class="bi bi-link-45deg text-danger"></i> Ambil Data dari URL</h3>

  <!-- Info URL Sekarang -->
  <div class="card mb-4">
    <div class="card-header"><i class="bi bi-info-circle"></i> URL Halaman Ini</div>
    <div class="card-body">
      <div class="mb-3">
        <label class="form-label text-secondary">Full URL</label>
        <div class="code-box" id="fullUrl"></div>
      </div>
      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label text-secondary">Domain</label>
          <div class="code-box" id="origin"></div>
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label text-secondary">Path</label>
          <div class="code-box" id="pathname"></div>
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label text-secondary">Query String</label>
          <div class="code-box" id="search"></div>
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label text-secondary">Hash</label>
          <div class="code-box" id="hash"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Ambil Query Parameter -->
  <div class="card mb-4">
    <div class="card-header"><i class="bi bi-braces"></i> Query Parameter</div>
    <div class="card-body">
      <p class="text-secondary">Coba buka URL: <code>?nama=John&umur=25&kota=Jakarta</code></p>
      <div id="paramsList"></div>
    </div>
  </div>

  <!-- Form Test -->
  <div class="card">
    <div class="card-header"><i class="bi bi-pencil-square"></i> Test Kirim Data ke URL</div>
    <div class="card-body">
      <form id="testForm">
        <div class="row g-3">
          <div class="col-md-4">
            <input type="text" name="nama" class="form-control bg-dark text-white" placeholder="Nama">
          </div>
          <div class="col-md-4">
            <input type="number" name="umur" class="form-control bg-dark text-white" placeholder="Umur">
          </div>
          <div class="col-md-4">
            <input type="text" name="kota" class="form-control bg-dark text-white" placeholder="Kota">
          </div>
        </div>
        <button type="submit" class="btn btn-danger mt-3">
          <i class="bi bi-send"></i> Kirim & Refresh URL
        </button>
      </form>
    </div>
  </div>

</div>

<script>
function loadURLData() {
  // 1. Ambil semua bagian URL
  const url = window.location;
  
  document.getElementById('fullUrl').textContent = url.href;
  document.getElementById('origin').textContent = url.origin;
  document.getElementById('pathname').textContent = url.pathname;
  document.getElementById('search').textContent = url.search || '(kosong)';
  document.getElementById('hash').textContent = url.hash || '(kosong)';

  // 2. Ambil query parameter pakai URLSearchParams
  const params = new URLSearchParams(url.search);
  const paramsList = document.getElementById('paramsList');
  
  if([...params].length === 0){
    paramsList.innerHTML = '<div class="alert alert-warning">Tidak ada query parameter. Coba tambah ?nama=John di URL</div>';
    return;
  }

  let html = '<table class="table table-dark table-striped">';
  html += '<thead><tr><th>Key</th><th>Value</th></tr></thead><tbody>';
  
  for(const [key, value] of params){
    html += `<tr><td><strong>${key}</strong></td><td>${value}</td></tr>`;
  }
  
  html += '</tbody></table>';
  paramsList.innerHTML = html;
}

// 3. Handle form submit - kirim data ke URL
document.getElementById('testForm').addEventListener('submit', function(e){
  e.preventDefault();
  const formData = new FormData(this);
  const params = new URLSearchParams(formData).toString();
  
  // Redirect ke URL dengan query baru
  window.location.href = window.location.pathname + '?' + params;
});

// Jalankan saat halaman load
loadURLData();
</script>
</body>
</html>
